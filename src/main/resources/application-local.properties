# Perfil local estable para desarrollo con XAMPP/MySQL.
# Se prioriza no ejecutar DDL/backfills ni jobs pesados al arrancar.

# Puerto local por defecto (sobrescribible por SERVER_PORT).
server.port=${SERVER_PORT:8080}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.flyway.enabled=false
spring.liquibase.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration

app.db.fix-mensajes-temporales-on-startup=false
app.db.fix-encuestas-on-startup=false
app.db.fix-mensajes-programados-on-startup=false
app.db.fix-mensajes-destacados-on-startup=false
app.db.fix-user-pinned-chat-on-startup=false
app.db.fix-mensajes-eliminacion-on-startup=false
app.db.fix-mensajes-tipo-system-on-startup=false
app.db.fix-usuarios-perfil-on-startup=true

app.mensajes.temporales.cleanup.enabled=false
app.chat.scheduled.enabled=false
app.notifications.cleanup.enabled=false
app.weekly.flows.cleanup.enabled=false
