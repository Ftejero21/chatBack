ai.max-input-length-summary=8000
ai.quick-replies.max-per-user-day=50
ai.quick-replies.cooldown-seconds=120
ai.rate-limit-enabled=true
ai.max-uses-per-user-per-minute=5
ai.max-uses-per-user-per-day=200
ai.max-global-uses-per-minute=20
ai.max-global-uses-per-day=1000

