spring.application.name=chat

# === MySQL ===
spring.datasource.url=jdbc:mysql://localhost:3306/chat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=root
spring.datasource.password=

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# === Servidor ===
server.port=8080

# === Spring Batch: inicializar schema (TEMPORAL) ===
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=NEVER
spring.sql.init.mode=never
spring.batch.jdbc.schema=classpath:org/springframework/batch/core/schema-mysql.sql
spring.sql.init.platform=mysql

# === Limpieza semanal de notificaciones (Batch) ===
# Criterio de borrado seguro: seen=true AND resolved=true AND createdAt < cutoff(retention-days).
app.notifications.cleanup.enabled=true
app.notifications.cleanup.cron=0 30 2 ? * FRI
app.notifications.cleanup.zone=Europe/Madrid
app.notifications.cleanup.retention-days=30
app.notifications.cleanup.chunk-size=500
app.notifications.cleanup.page-size=1000
app.notifications.cleanup.retry-limit=3
app.notifications.cleanup.max-launch-attempts=3
app.notifications.cleanup.launch-backoff-seconds=30

# === Limpieza semanal de flujos cerrados (Batch) ===
# Primero expira invitaciones PENDING antiguas -> DECLINED cuando createdAt < now - pending-expire-months.
# Luego borra SOLO la semana anterior [lunes 00:00, lunes 00:00 siguiente) en:
# - group_invites.status=ACCEPTED (por respondedAt)
# - solicitud_desbaneo.estado in (APROBADA, RECHAZADA) (por updatedAt)
app.weekly.flows.cleanup.enabled=true
app.weekly.flows.cleanup.cron=0 45 2 ? * FRI
app.weekly.flows.cleanup.zone=Europe/Madrid
app.weekly.flows.cleanup.pending-expire-months=3
app.weekly.flows.cleanup.chunk-size=500
app.weekly.flows.cleanup.page-size=1000
app.weekly.flows.cleanup.retry-limit=3
app.weekly.flows.cleanup.max-launch-attempts=3
app.weekly.flows.cleanup.launch-backoff-seconds=30

# === Mensajes temporales (esquema + limpieza) ===
app.db.fix-mensajes-temporales-on-startup=true
app.db.fix-encuestas-on-startup=true
app.db.fix-mensajes-programados-on-startup=true
app.db.fix-mensajes-destacados-on-startup=true
# Backfill historial legacy: activo=false y fecha_eliminacion null -> COALESCE(updated_at, fecha_envio, UTC_TIMESTAMP()).
app.db.fix-mensajes-eliminacion-on-startup=true
app.mensajes.temporales.cleanup.enabled=true
app.mensajes.temporales.cleanup.fixed-delay-ms=60000
app.mensajes.temporales.cleanup.initial-delay-ms=30000
app.mensajes.temporales.cleanup.batch-size=500
app.mensajes.temporales.cleanup.max-lotes-por-ejecucion=10
app.mensajes.temporales.cleanup.retencion-tecnica-dias=0
app.mensajes.temporales.cleanup.limpieza-tecnica.batch-size=500

# === Mensajes programados ===
app.chat.scheduled.enabled=true
app.chat.scheduled.fixed-delay-ms=30000
app.chat.scheduled.initial-delay-ms=15000
app.chat.scheduled.batch-size=100
app.chat.scheduled.lock-seconds=120
app.chat.scheduled.max-attempts=3

# === Upload security ===
app.uploads.security.max-file-bytes=104857600
app.uploads.security.allowed-mimes=application/octet-stream,image/png,image/jpeg,image/webp,image/gif,audio/webm,audio/ogg,audio/mpeg,audio/wav,audio/mp4,application/pdf,text/plain,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
app.uploads.security.allowed-extensions=.bin,.png,.jpg,.jpeg,.webp,.gif,.webm,.ogg,.mp3,.wav,.m4a,.aac,.opus,.pdf,.txt,.zip,.doc,.docx
app.uploads.security.blocked-extensions=.exe,.msi,.bat,.cmd,.ps1,.js,.vbs,.jar,.com,.scr,.pif,.reg,.sh
app.uploads.security.antivirus.enabled=false
app.uploads.security.antivirus.command=
app.uploads.security.antivirus.quarantine-dir=quarantine

# === Multipart upload limits ===
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# === Logs util ===
logging.level.org.springframework.batch=INFO
logging.level.com.chat.chat.Batch=INFO

# === OpenAPI / Swagger ===
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# === MAIL util ===
spring.mail.host=smtp.Gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=fernandotejero566@gmail.com
spring.mail.password=kqeclitjvvbjzyul
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

