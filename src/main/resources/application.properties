spring.application.name=chat

# === MySQL ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${APP_DB_HOST:127.0.0.1}:${APP_DB_PORT:3306}/${APP_DB_NAME:chat}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
spring.datasource.hikari.initialization-fail-timeout=${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:10000}

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# === JWT ===
# Requerido: Base64 que decodifique a >=32 bytes (HS256)
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration=86400000
app.jwt.clock-skew-seconds=60
# app.jwt.issuer=tejechat-backend
# app.jwt.audience=tejechat-web

# === Servidor ===
server.port=${SERVER_PORT:8080}
# Prefijo global de la app (override por variable de entorno APP_CONTEXT_PATH)
server.servlet.context-path=${APP_CONTEXT_PATH:/TejeChat}

# === Spring Batch: inicializar schema (TEMPORAL) ===
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=NEVER
spring.sql.init.mode=never
spring.batch.jdbc.schema=classpath:org/springframework/batch/core/schema-mysql.sql
spring.sql.init.platform=mysql

# === Limpieza semanal de notificaciones (Batch) ===
# Criterio de borrado seguro: seen=true AND resolved=true AND createdAt < cutoff(retention-days).
app.notifications.cleanup.enabled=true
app.notifications.cleanup.cron=0 30 2 ? * FRI
app.notifications.cleanup.zone=Europe/Madrid
app.notifications.cleanup.retention-days=30
app.notifications.cleanup.chunk-size=500
app.notifications.cleanup.page-size=1000
app.notifications.cleanup.retry-limit=3
app.notifications.cleanup.max-launch-attempts=3
app.notifications.cleanup.launch-backoff-seconds=30

# === Limpieza semanal de flujos cerrados (Batch) ===
# Primero expira invitaciones PENDING antiguas -> DECLINED cuando createdAt < now - pending-expire-months.
# Luego borra SOLO la semana anterior [lunes 00:00, lunes 00:00 siguiente) en:
# - group_invites.status=ACCEPTED (por respondedAt)
# - solicitud_desbaneo.estado in (APROBADA, RECHAZADA) (por updatedAt)
app.weekly.flows.cleanup.enabled=true
app.weekly.flows.cleanup.cron=0 45 2 ? * FRI
app.weekly.flows.cleanup.zone=Europe/Madrid
app.weekly.flows.cleanup.pending-expire-months=3
app.weekly.flows.cleanup.chunk-size=500
app.weekly.flows.cleanup.page-size=1000
app.weekly.flows.cleanup.retry-limit=3
app.weekly.flows.cleanup.max-launch-attempts=3
app.weekly.flows.cleanup.launch-backoff-seconds=30

# === Mensajes temporales (esquema + limpieza) ===
app.db.fix-mensajes-temporales-on-startup=true
app.db.fix-encuestas-on-startup=true
app.db.fix-mensajes-programados-on-startup=true
app.db.fix-mensajes-destacados-on-startup=true
app.db.fix-user-pinned-chat-on-startup=true
# Backfill historial legacy: activo=false y fecha_eliminacion null -> COALESCE(updated_at, fecha_envio, UTC_TIMESTAMP()).
app.db.fix-mensajes-eliminacion-on-startup=true
app.db.fix-mensajes-tipo-system-on-startup=true
app.db.fix-usuarios-perfil-on-startup=true
app.mensajes.temporales.cleanup.enabled=true
app.mensajes.temporales.cleanup.fixed-delay-ms=5000
app.mensajes.temporales.cleanup.initial-delay-ms=5000
app.mensajes.temporales.cleanup.batch-size=500
app.mensajes.temporales.cleanup.max-lotes-por-ejecucion=10
app.mensajes.temporales.cleanup.retencion-tecnica-dias=0
app.mensajes.temporales.cleanup.limpieza-tecnica.batch-size=500

# === Mensajes programados ===
app.chat.scheduled.enabled=true
app.chat.scheduled.fixed-delay-ms=30000
app.chat.scheduled.initial-delay-ms=15000
app.chat.scheduled.batch-size=100
app.chat.scheduled.lock-seconds=120
app.chat.scheduled.max-attempts=3

# === Admin direct temporales ===
app.chat.admin-direct.temporal-default-expires-after-read-seconds=60

# === Presence scheduler ===
app.presence.away-timeout-ms=300000
app.presence.reconcile.fixed-delay-ms=45000
app.presence.reconcile.initial-delay-ms=15000

# === Batch advertencias por denuncias ===
tejechat.batch.report-warning.enabled=true
tejechat.batch.report-warning.cron=0 29 2 * * *
tejechat.batch.report-warning.zone=Europe/Madrid
tejechat.batch.report-warning.threshold=4
tejechat.batch.report-warning.max-samples=3
tejechat.batch.report-warning.admin-user-id=0
tejechat.batch.report-warning.moderation-origin=batch_report_warning_auto
tejechat.batch.report-warning.moderation-reason=Advertencia automatica por denuncias

# === Upload security ===
app.uploads.security.max-file-bytes=104857600
app.uploads.security.allowed-mimes=application/octet-stream,image/png,image/jpeg,image/webp,image/gif,audio/webm,audio/ogg,audio/mpeg,audio/wav,audio/mp4,application/pdf,text/plain,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
app.uploads.security.allowed-extensions=.bin,.png,.jpg,.jpeg,.webp,.gif,.webm,.ogg,.mp3,.wav,.m4a,.aac,.opus,.pdf,.txt,.zip,.doc,.docx
app.uploads.security.blocked-extensions=.exe,.msi,.bat,.cmd,.ps1,.js,.vbs,.jar,.com,.scr,.pif,.reg,.sh
app.uploads.security.antivirus.enabled=false
app.uploads.security.antivirus.command=
app.uploads.security.antivirus.quarantine-dir=quarantine

# === Multipart upload limits ===
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# === Logs util ===
logging.level.org.springframework.batch=INFO
logging.level.com.chat.chat.Batch=INFO

# === OpenAPI / Swagger ===
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# === MAIL util ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# === Admin audit decrypt (RSA-OAEP SHA-256) ===
# Provide either the PEM content (PKCS8) or a path to the PEM file.
# app.audit.admin-private-key-pem=${APP_AUDIT_ADMIN_PRIVATE_KEY_PEM:}
app.audit.admin-private-key-pem=${APP_AUDIT_ADMIN_PRIVATE_KEY_PEM:}
# app.audit.admin-private-key-path=C:/path/to/admin-private-key.pem
# LOCAL ONLY: incluir private key de auditoría en /api/usuarios/login para ADMIN.

# === Google Auth ===
# Configurar GOOGLE_CLIENT_ID en entorno para validar aud del ID token.
app.auth.google.client-id=${GOOGLE_CLIENT_ID:7308013918-s6pboomi1maisaq1ebrm12lutubdder9.apps.googleusercontent.com}

